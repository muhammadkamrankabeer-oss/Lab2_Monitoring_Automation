- name: Run Load Balancer (The Traffic Cop)
      community.docker.docker_container:
        name: load-balancer
        image: nginx:latest
        state: started
        recreate: yes
        restart_policy: always
        labels:
          project: "Lab3_HA"
          role: "balancer"
        ports:
          - "8080:80"
        volumes:
          - "{{ playbook_dir }}/nginx.conf:/etc/nginx/nginx.conf:ro"
