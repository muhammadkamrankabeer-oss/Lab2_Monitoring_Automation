cat <<EOF > alert_rules.yml
groups:
  - name: Dell_Laptop_Alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CPU Usage too high on {{ \$labels.instance }}"
          description: "CPU usage has been above 85% for more than 2 minutes."
EOF
