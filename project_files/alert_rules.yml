groups:
  - name: hardware_alerts
    rules:
      - alert: HostHighCpuLoad
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 85
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CPU Stress on Dell E7440"
          description: "CPU usage is at {{ $value }}%."
